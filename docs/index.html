<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bitcoin AI Lab</title>
<style>
body{margin:0;background:#0b0f14;color:#e8eef6;font-family:system-ui,-apple-system,Segoe UI,sans-serif}main{max-width:920px;margin:auto;padding:14px}h1{font-size:42px;line-height:.95;margin:14px 0 8px}.sub{color:#9fb0c3;line-height:1.45}.panel{background:#111821;border:1px solid #263649;border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 12px 26px #0006}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.card{background:#172230;border-radius:16px;padding:12px}.k{color:#9fb0c3;font-size:12px;font-weight:800}.v{font-size:23px;font-weight:900;margin-top:4px}select,input,button{width:100%;min-height:44px;border-radius:14px;border:1px solid #263649;background:#172230;color:#e8eef6;padding:10px;font:inherit;margin:5px 0 10px}button{background:#f7931a;color:#1b1004;border:0;font-weight:900}canvas{width:100%;height:240px;background:#071019;border-radius:16px;border:1px solid #263649}.good{color:#57d68d}.bad{color:#ff6b6b}.log{max-height:240px;overflow:auto;font-size:13px;color:#c8d4e2}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #ffffff12;text-align:left}@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}h1{font-size:34px}}
</style>
</head>
<body><main>
<h1>Bitcoin AI Lab</h1>
<p class="sub">Mobile browser preview. Fake-money bot simulation only. No exchange connection.</p>
<section class="panel">
<label>Bot</label><select id="bot"><option value="trend">Trend Bot</option><option value="hold">Buy & Hold</option><option value="dip">Dip Buyer</option><option value="random">Random Bot</option></select>
<label>Market</label><select id="market"><option value="mixed">Mixed</option><option value="bull">Bull</option><option value="bear">Bear</option><option value="chop">Chop</option><option value="crash">Crash</option></select>
<label>Seed</label><input id="seed" type="number" value="42"><button onclick="run()">Run simulation</button>
</section>
<section class="grid"><div class="card"><div class="k">Final</div><div class="v" id="final">-</div></div><div class="card"><div class="k">Return</div><div class="v" id="ret">-</div></div><div class="card"><div class="k">Drawdown</div><div class="v" id="dd">-</div></div><div class="card"><div class="k">Trades</div><div class="v" id="trades">-</div></div></section>
<section class="panel"><canvas id="chart" width="900" height="300"></canvas><p class="sub" id="summary">Run a bot to see the result.</p></section>
<section class="panel"><h2>Replay</h2><div class="log"><table><thead><tr><th>Step</th><th>Price</th><th>Action</th><th>Value</th></tr></thead><tbody id="log"></tbody></table></div></section>
</main><script>
function R(s){return()=>((s=(s*1664525+1013904223)>>>0)/4294967296)}function N(r){let u=Math.max(r(),1e-9),v=Math.max(r(),1e-9);return Math.sqrt(-2*Math.log(u))*Math.cos(6.283*v)}
function market(kind,seed){let r=R(seed),p=70000,a=[];for(let i=0;i<220;i++){let d=0,v=.018;if(kind==='bull')d=.0024;if(kind==='bear')d=-.002;if(kind==='chop'){d=Math.sin(i/7)*.001;v=.012}if(kind==='crash'){d=i>75&&i<100?-.025:i>130?.0017:.0003;v=i>70&&i<110?.035:.017}if(kind==='mixed')d=i<60?.002:i<115?-.0027:i<170?Math.sin(i/5)*.0013:.0015;p=Math.max(1000,p*(1+d+N(r)*v));a.push(p)}return a}
function avg(a,i,n){if(i<n)return null;let s=0;for(let j=i-n+1;j<=i;j++)s+=a[j];return s/n}
function sim(bot,prices,seed){let r=R(seed+99),cash=10000,btc=0,peak=10000,dd=0,tr=0,vals=[],log=[];for(let i=0;i<prices.length;i++){let p=prices[i],act='hold',sz=0,fast=avg(prices,i,8),slow=avg(prices,i,24),prev=prices[Math.max(0,i-1)],chg=(p-prev)/prev,val=cash+btc*p,share=val?btc*p/val:0;if(bot==='hold'&&i===0){act='buy';sz=1}else if(bot==='random'){let x=r();if(x<.08){act='buy';sz=.25}else if(x>.92){act='sell';sz=.25}}else if(bot==='trend'&&fast&&slow){if(fast>slow&&share<.85){act='buy';sz=.35}else if(fast<slow&&share>.05){act='sell';sz=.45}}else if(bot==='dip'){if(chg<-.025){act='buy';sz=.3}else if(chg>.035){act='sell';sz=.2}}if(act==='buy'&&cash>0){let spend=cash*sz,fee=spend*.001;cash-=spend;btc+=(spend-fee)/p;tr++}if(act==='sell'&&btc>0){let q=btc*sz,g=q*p,fee=g*.001;btc-=q;cash+=g-fee;tr++}val=cash+btc*p;peak=Math.max(peak,val);dd=Math.min(dd,(val-peak)/peak*100);vals.push(val);if(act!=='hold'||i%18===0||i===prices.length-1)log.push([i+1,p,act,val])}return{final:vals.at(-1),ret:(vals.at(-1)-10000)/100,dd,tr,vals,log}}
function draw(prices,vals){let c=document.getElementById('chart'),x=c.getContext('2d'),w=c.width,h=c.height,p=30,all=prices.concat(vals),mn=Math.min(...all),mx=Math.max(...all);x.clearRect(0,0,w,h);function sx(i){return p+i*(w-p*2)/(prices.length-1)}function sy(v){return h-p-(v-mn)/(mx-mn)*(h-p*2)}function line(a,col,lw){x.strokeStyle=col;x.lineWidth=lw;x.beginPath();a.forEach((v,i)=>i?x.lineTo(sx(i),sy(v)):x.moveTo(sx(i),sy(v)));x.stroke()}line(prices,'#f7931a',3);line(vals,'#57d68d',3);x.fillStyle='#9fb0c3';x.font='18px system-ui';x.fillText('orange = BTC price, green = bot value',p,22)}
function money(n){return '$'+Math.round(n).toLocaleString()}function run(){let b=bot.value,ps=market(document.getElementById('market').value,+seed.value||42),r=sim(b,ps,+seed.value||42);final.textContent=money(r.final);ret.textContent=(r.ret>=0?'+':'')+r.ret.toFixed(2)+'%';ret.className='v '+(r.ret>=0?'good':'bad');dd.textContent=r.dd.toFixed(2)+'%';trades.textContent=r.tr;summary.textContent=b+' ended at '+money(r.final)+' with '+r.tr+' trades.';draw(ps,r.vals);log.innerHTML=r.log.slice(-60).map(e=>'<tr><td>'+e[0]+'</td><td>'+money(e[1])+'</td><td>'+e[2]+'</td><td>'+money(e[3])+'</td></tr>').join('')}run();
</script></body></html>
